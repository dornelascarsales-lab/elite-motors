<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Motors - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --dark: #0a0a0a;
            --dark-mid: #1a1a1a;
            --gold: #d4a843;
            --gold-dim: rgba(212, 168, 67, 0.15);
            --white: #ffffff;
            --gray: #94a3b8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark);
            color: var(--white);
            min-height: 100vh;
        }

        /* ========== LOGIN ========== */
        .login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-box {
            background: var(--dark-mid);
            border: 1px solid var(--gold-dim);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-box h1 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .login-box h1 span { color: var(--gold); }

        .login-box p {
            color: var(--gray);
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .login-box input {
            width: 100%;
            padding: 14px 16px;
            background: var(--dark);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: var(--white);
            font-size: 0.95rem;
            margin-bottom: 12px;
            outline: none;
            transition: border-color 0.3s;
        }

        .login-box input:focus {
            border-color: var(--gold);
        }

        .login-box button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--gold), #b8912e);
            color: var(--dark);
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
        }

        .login-box button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(212, 168, 67, 0.3);
        }

        .login-error {
            color: #ef4444;
            font-size: 0.85rem;
            margin-top: 12px;
            display: none;
        }

        /* ========== DASHBOARD ========== */
        .dashboard {
            display: none;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .dash-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0 30px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 30px;
        }

        .dash-header h1 {
            font-size: 1.5rem;
            font-weight: 800;
        }

        .dash-header h1 span { color: var(--gold); }

        .dash-header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .period-select {
            padding: 8px 14px;
            background: var(--dark-mid);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: var(--white);
            font-size: 0.85rem;
        }

        .btn-logout {
            padding: 8px 16px;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            color: var(--gray);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-logout:hover {
            border-color: #ef4444;
            color: #ef4444;
        }

        /* Stats Cards */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 16px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--dark-mid);
            border: 1px solid var(--gold-dim);
            border-radius: 12px;
            padding: 24px;
        }

        .stat-card .stat-label {
            font-size: 0.8rem;
            color: var(--gray);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .stat-card .stat-value {
            font-size: 2rem;
            font-weight: 900;
            color: var(--gold);
        }

        /* Table */
        .table-section {
            background: var(--dark-mid);
            border: 1px solid var(--gold-dim);
            border-radius: 12px;
            overflow: hidden;
        }

        .table-section h2 {
            padding: 20px 24px;
            font-size: 1.1rem;
            font-weight: 700;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .table-wrap {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead th {
            padding: 14px 16px;
            text-align: left;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
        }

        thead th:hover {
            color: var(--white);
        }

        tbody tr {
            border-bottom: 1px solid rgba(255,255,255,0.03);
            transition: background 0.2s;
        }

        tbody tr:hover {
            background: rgba(212, 168, 67, 0.05);
        }

        tbody td {
            padding: 12px 16px;
            font-size: 0.85rem;
            color: #ccc;
            white-space: nowrap;
        }

        tbody td:first-child {
            font-weight: 600;
            color: var(--white);
            max-width: 250px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .badge-hot {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
        }

        .badge-warm {
            background: rgba(245, 158, 11, 0.15);
            color: #f59e0b;
        }

        .badge-cold {
            background: rgba(100, 116, 139, 0.15);
            color: #94a3b8;
        }

        .conversion-bar {
            display: inline-block;
            height: 6px;
            border-radius: 3px;
            background: var(--gold);
            min-width: 4px;
            vertical-align: middle;
            margin-right: 6px;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 60px;
            color: var(--gray);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Mobile */
        @media (max-width: 768px) {
            .stats-row {
                grid-template-columns: repeat(2, 1fr);
            }

            .dash-header {
                flex-direction: column;
                gap: 16px;
                align-items: flex-start;
            }

            tbody td:first-child {
                max-width: 150px;
            }
        }
    </style>
</head>
<body>

    <!-- LOGIN SCREEN -->
    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <h1>Elite <span>Motors</span></h1>
            <p>Dashboard de Performance</p>
            <input type="email" id="loginEmail" placeholder="Email">
            <input type="password" id="loginPassword" placeholder="Senha">
            <button onclick="doLogin()">Entrar</button>
            <div class="login-error" id="loginError">Email ou senha incorretos</div>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div class="dashboard" id="dashboard">
        <div class="dash-header">
            <h1>Elite <span>Motors</span> Dashboard</h1>
            <div class="dash-header-actions">
                <select class="period-select" id="periodSelect" onchange="loadData()">
                    <option value="7">Últimos 7 dias</option>
                    <option value="30" selected>Últimos 30 dias</option>
                    <option value="0">Todo o período</option>
                </select>
                <button class="btn-logout" onclick="doLogout()">Sair</button>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-label">Visitantes Únicos</div>
                <div class="stat-value" id="totalVisitors">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Cliques WhatsApp</div>
                <div class="stat-value" id="totalWhatsapp">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Visualizações</div>
                <div class="stat-value" id="totalViews">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Cliques Fotos</div>
                <div class="stat-value" id="totalPhotos">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Taxa Conversão</div>
                <div class="stat-value" id="totalConversion">-</div>
            </div>
        </div>

        <!-- Table -->
        <div class="table-section">
            <h2>Ranking de Performance por Veículo</h2>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th onclick="sortTable(0)"># Veículo</th>
                            <th onclick="sortTable(1)">Únicos</th>
                            <th onclick="sortTable(2)">WhatsApp</th>
                            <th onclick="sortTable(3)">Views</th>
                            <th onclick="sortTable(4)">Fotos</th>
                            <th onclick="sortTable(5)">Conversão</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="6" class="loading"><div class="spinner"></div>Carregando dados...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- FIREBASE -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDi-fKmgiLOIHm5OzBWmFNHnGRWDDH8gmA",
            authDomain: "elite-motors-8f364.firebaseapp.com",
            projectId: "elite-motors-8f364",
            storageBucket: "elite-motors-8f364.firebasestorage.app",
            messagingSenderId: "706116258130",
            appId: "1:706116258130:web:ea7063e1f8fdff0885d28b"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Check auth state
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                loadData();
            } else {
                document.getElementById('loginScreen').style.display = 'flex';
                document.getElementById('dashboard').style.display = 'none';
            }
        });

        function doLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const errorEl = document.getElementById('loginError');
            errorEl.style.display = 'none';

            auth.signInWithEmailAndPassword(email, password).catch(err => {
                errorEl.style.display = 'block';
                errorEl.textContent = 'Email ou senha incorretos';
            });
        }

        // Enter key to login
        document.getElementById('loginPassword').addEventListener('keydown', e => {
            if (e.key === 'Enter') doLogin();
        });

        function doLogout() {
            auth.signOut();
        }

        async function loadData() {
            const days = parseInt(document.getElementById('periodSelect').value);
            let startDate = null;
            if (days > 0) {
                startDate = new Date();
                startDate.setDate(startDate.getDate() - days);
                startDate = startDate.toISOString();
            }

            try {
                const [whatsappSnap, viewsSnap, photosSnap, visitsSnap] = await Promise.all([
                    fetchCollection('whatsapp_clicks', startDate),
                    fetchCollection('card_views', startDate),
                    fetchCollection('photo_clicks', startDate),
                    fetchCollection('page_visits', startDate)
                ]);

                const whatsappData = whatsappSnap.docs.map(d => d.data());
                const viewsData = viewsSnap.docs.map(d => d.data());
                const photosData = photosSnap.docs.map(d => d.data());
                const visitsData = visitsSnap.docs.map(d => d.data());

                // Count unique visitors (global)
                const uniqueVisitorIds = new Set(visitsData.map(d => d.visitorId).filter(Boolean));

                // Aggregate by vehicle name
                const vehicles = {};

                viewsData.forEach(d => {
                    const name = d.name || 'Unknown';
                    if (!vehicles[name]) vehicles[name] = { whatsapp: 0, views: 0, photos: 0, price: d.price || '', uniqueViewers: new Set(), uniqueWa: new Set() };
                    vehicles[name].views++;
                    if (d.visitorId) vehicles[name].uniqueViewers.add(d.visitorId);
                });

                whatsappData.forEach(d => {
                    const name = d.name || 'Unknown';
                    if (!vehicles[name]) vehicles[name] = { whatsapp: 0, views: 0, photos: 0, price: d.price || '', uniqueViewers: new Set(), uniqueWa: new Set() };
                    vehicles[name].whatsapp++;
                    if (d.visitorId) vehicles[name].uniqueWa.add(d.visitorId);
                });

                photosData.forEach(d => {
                    const name = d.name || 'Unknown';
                    if (!vehicles[name]) vehicles[name] = { whatsapp: 0, views: 0, photos: 0, price: '', uniqueViewers: new Set(), uniqueWa: new Set() };
                    vehicles[name].photos++;
                });

                // Totals
                const totalW = whatsappData.length;
                const totalV = viewsData.length;
                const totalP = photosData.length;
                const totalC = totalV > 0 ? ((totalW / totalV) * 100).toFixed(1) + '%' : '0%';

                document.getElementById('totalVisitors').textContent = uniqueVisitorIds.size;
                document.getElementById('totalWhatsapp').textContent = totalW;
                document.getElementById('totalViews').textContent = totalV;
                document.getElementById('totalPhotos').textContent = totalP;
                document.getElementById('totalConversion').textContent = totalC;

                // Build table sorted by whatsapp clicks
                const sorted = Object.entries(vehicles).sort((a, b) => b[1].whatsapp - a[1].whatsapp);

                const tbody = document.getElementById('tableBody');
                if (sorted.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px;color:#666;">Nenhum dado encontrado para este período</td></tr>';
                    return;
                }

                tbody.innerHTML = sorted.map(([name, data]) => {
                    const uniqueCount = data.uniqueViewers.size;
                    const conv = data.views > 0 ? ((data.whatsapp / data.views) * 100).toFixed(1) : 0;
                    const convNum = parseFloat(conv);
                    const barWidth = Math.min(convNum * 2, 100);

                    let badge, badgeClass;
                    if (data.whatsapp >= 5) { badge = 'HOT'; badgeClass = 'badge-hot'; }
                    else if (data.whatsapp >= 2) { badge = 'WARM'; badgeClass = 'badge-warm'; }
                    else { badge = 'COLD'; badgeClass = 'badge-cold'; }

                    return `<tr>
                        <td>${name}</td>
                        <td>${uniqueCount}</td>
                        <td><strong>${data.whatsapp}</strong></td>
                        <td>${data.views}</td>
                        <td>${data.photos}</td>
                        <td><span class="conversion-bar" style="width:${barWidth}px"></span>${conv}%</td>
                        <td><span class="badge ${badgeClass}">${badge}</span></td>
                    </tr>`;
                }).join('');

            } catch (err) {
                console.error('Error loading data:', err);
                document.getElementById('tableBody').innerHTML = '<tr><td colspan="6" style="text-align:center;padding:40px;color:#ef4444;">Erro ao carregar dados</td></tr>';
            }
        }

        async function fetchCollection(name, startDate) {
            let query = db.collection(name);
            if (startDate) {
                query = query.where('timestamp', '>=', startDate);
            }
            return query.get();
        }

        // Sort table
        let sortDir = {};
        function sortTable(colIndex) {
            const tbody = document.getElementById('tableBody');
            const rows = Array.from(tbody.querySelectorAll('tr'));
            sortDir[colIndex] = !sortDir[colIndex];

            rows.sort((a, b) => {
                let aVal = a.cells[colIndex].textContent.trim();
                let bVal = b.cells[colIndex].textContent.trim();
                const aNum = parseFloat(aVal.replace(/[^0-9.-]/g, ''));
                const bNum = parseFloat(bVal.replace(/[^0-9.-]/g, ''));

                if (!isNaN(aNum) && !isNaN(bNum)) {
                    return sortDir[colIndex] ? aNum - bNum : bNum - aNum;
                }
                return sortDir[colIndex] ? aVal.localeCompare(bVal) : bVal.localeCompare(aVal);
            });

            rows.forEach(r => tbody.appendChild(r));
        }
    </script>
</body>
</html>
